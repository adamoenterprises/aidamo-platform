<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0}
body{background:transparent;overflow:hidden}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
var c=document.getElementById("c"),x=c.getContext("2d");
var W,H,nodes=[],edges=[],t=0;
var gold="rgba(212,175,55,",dim="rgba(212,175,55,0.08)";
var N=40,DIST=140,SPEED=0.3;

function resize(){
W=c.width=c.offsetWidth*2;H=c.height=c.offsetHeight*2;
x.scale(1,1);
}
resize();
window.addEventListener("resize",resize);

for(var i=0;i<N;i++){
nodes.push({
x:Math.random()*W,y:Math.random()*H,
vx:(Math.random()-0.5)*SPEED,vy:(Math.random()-0.5)*SPEED,
r:1.5+Math.random()*1.5,
phase:Math.random()*Math.PI*2,
pulseSpeed:0.01+Math.random()*0.02
});
}

function draw(){
t++;
x.clearRect(0,0,W,H);

// Update positions
for(var i=0;i<N;i++){
var n=nodes[i];
n.x+=n.vx;n.y+=n.vy;
if(n.x<0||n.x>W)n.vx*=-1;
if(n.y<0||n.y>H)n.vy*=-1;
n.phase+=n.pulseSpeed;
}

// Draw edges
for(var i=0;i<N;i++){
for(var j=i+1;j<N;j++){
var a=nodes[i],b=nodes[j];
var dx=a.x-b.x,dy=a.y-b.y;
var d=Math.sqrt(dx*dx+dy*dy);
if(d<DIST){
var alpha=0.15*(1-d/DIST);
// Pulse effect along edges
var pulse=0.5+0.5*Math.sin(t*0.03+i*0.5);
alpha*=(0.6+0.4*pulse);
x.beginPath();
x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);
x.strokeStyle=gold+alpha+")";
x.lineWidth=0.8;
x.stroke();
}
}
}

// Draw nodes
for(var i=0;i<N;i++){
var n=nodes[i];
var pulse=0.5+0.5*Math.sin(n.phase);
var glow=n.r+pulse*3;

// Outer glow
var g=x.createRadialGradient(n.x,n.y,0,n.x,n.y,glow*3);
g.addColorStop(0,gold+(0.15+pulse*0.1)+")");
g.addColorStop(1,gold+"0)");
x.beginPath();x.arc(n.x,n.y,glow*3,0,Math.PI*2);
x.fillStyle=g;x.fill();

// Core dot
x.beginPath();x.arc(n.x,n.y,n.r+pulse*0.5,0,Math.PI*2);
x.fillStyle=gold+(0.6+pulse*0.4)+")";
x.fill();
}

// Occasional signal pulse along a random edge
if(t%90===0){
var a=nodes[Math.floor(Math.random()*N)];
var closest=null,cd=DIST;
for(var j=0;j<N;j++){
if(nodes[j]===a)continue;
var dx=a.x-nodes[j].x,dy=a.y-nodes[j].y;
var d=Math.sqrt(dx*dx+dy*dy);
if(d<cd){cd=d;closest=nodes[j]}
}
if(closest){
var g2=x.createRadialGradient(
(a.x+closest.x)/2,(a.y+closest.y)/2,0,
(a.x+closest.x)/2,(a.y+closest.y)/2,cd/2
);
g2.addColorStop(0,gold+"0.4)");
g2.addColorStop(1,gold+"0)");
x.beginPath();
x.arc((a.x+closest.x)/2,(a.y+closest.y)/2,cd/2,0,Math.PI*2);
x.fillStyle=g2;x.fill();
}
}

requestAnimationFrame(draw);
}
draw();
})();
</script>
</body>
</html>
