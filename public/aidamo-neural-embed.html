<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0}
body{background:#000;overflow:hidden}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
var c=document.getElementById("c"),x=c.getContext("2d");
var W,H,nodes=[],t=0,bolts=[],rings=[];
var N=70,DIST=160,SPEED=0.25;
var gold="212,175,55";

function resize(){
W=c.width=c.offsetWidth*2;H=c.height=c.offsetHeight*2;
}
resize();
window.addEventListener("resize",resize);

// Grid-aligned spawn — industrial, structured
for(var i=0;i<N;i++){
var gridX=Math.floor(Math.random()*10)/10*W;
var gridY=Math.floor(Math.random()*8)/8*H;
nodes.push({
x:gridX+(Math.random()-0.5)*80,
y:gridY+(Math.random()-0.5)*80,
ox:0,oy:0,
vx:(Math.random()-0.5)*SPEED,
vy:(Math.random()-0.5)*SPEED,
r:1+Math.random()*2.5,
phase:Math.random()*Math.PI*2,
pulseSpeed:0.008+Math.random()*0.015,
energy:0,
locked:Math.random()<0.15
});
}

// Lock some nodes — they don't move, like anchor points
for(var i=0;i<N;i++){
if(nodes[i].locked){nodes[i].vx=0;nodes[i].vy=0}
}

function drawBolt(ax,ay,bx,by,alpha,depth){
if(depth<=0){
x.beginPath();x.moveTo(ax,ay);x.lineTo(bx,by);
x.strokeStyle="rgba("+gold+","+alpha+")";
x.lineWidth=1.8;x.stroke();
return;
}
var mx=(ax+bx)/2+(Math.random()-0.5)*30/depth;
var my=(ay+by)/2+(Math.random()-0.5)*30/depth;
drawBolt(ax,ay,mx,my,alpha,depth-1);
drawBolt(mx,my,bx,by,alpha,depth-1);
}

function spawnBolt(){
var a=nodes[Math.floor(Math.random()*N)];
var best=null,bd=DIST*1.8;
for(var j=0;j<N;j++){
if(nodes[j]===a)continue;
var dx=a.x-nodes[j].x,dy=a.y-nodes[j].y;
var d=Math.sqrt(dx*dx+dy*dy);
if(d<bd&&d>40){bd=d;best=nodes[j]}
}
if(best){
bolts.push({ax:a.x,ay:a.y,bx:best.x,by:best.y,life:15});
a.energy=1;best.energy=1;
// Chain reaction — hit nearby nodes
for(var k=0;k<N;k++){
var dx=best.x-nodes[k].x,dy=best.y-nodes[k].y;
if(Math.sqrt(dx*dx+dy*dy)<80)nodes[k].energy=Math.max(nodes[k].energy,0.5);
}
}
}

// Expanding shockwave rings
function spawnRing(){
rings.push({x:W*0.3+Math.random()*W*0.4,y:H*0.3+Math.random()*H*0.4,r:0,maxR:200+Math.random()*200,life:1});
}

function draw(){
t++;

// Heavy dark fade — long trails
x.fillStyle="rgba(0,0,0,0.1)";
x.fillRect(0,0,W,H);

// Update nodes
for(var i=0;i<N;i++){
var n=nodes[i];
if(!n.locked){
n.x+=n.vx;n.y+=n.vy;
if(n.x<-20)n.x=W+20;if(n.x>W+20)n.x=-20;
if(n.y<-20)n.y=H+20;if(n.y>H+20)n.y=-20;
}
n.phase+=n.pulseSpeed;
if(n.energy>0)n.energy*=0.94;
}

// Spawn events — relentless
if(t%18===0)spawnBolt();
if(t%30===0)spawnBolt();
if(t%120===0)spawnRing();

// Draw grid lines — faint industrial scaffold
x.globalAlpha=0.025;
x.strokeStyle="rgba("+gold+",1)";
x.lineWidth=0.5;
for(var gx=0;gx<W;gx+=W/10){
x.beginPath();x.moveTo(gx,0);x.lineTo(gx,H);x.stroke();
}
for(var gy=0;gy<H;gy+=H/8){
x.beginPath();x.moveTo(0,gy);x.lineTo(W,gy);x.stroke();
}
x.globalAlpha=1;

// Draw connections — structured web
for(var i=0;i<N;i++){
for(var j=i+1;j<N;j++){
var a=nodes[i],b=nodes[j];
var dx=a.x-b.x,dy=a.y-b.y;
var d=Math.sqrt(dx*dx+dy*dy);
if(d<DIST){
var alpha=0.12*(1-d/DIST);
var surge=Math.max(a.energy,b.energy);
alpha+=surge*0.35;
x.beginPath();
x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);
x.strokeStyle="rgba("+gold+","+alpha+")";
x.lineWidth=0.6+surge*2.5;
x.stroke();

// Double-line effect on strong connections for industrial feel
if(surge>0.3){
var nx=-(a.y-b.y)/d*3,ny=(a.x-b.x)/d*3;
x.beginPath();
x.moveTo(a.x+nx,a.y+ny);x.lineTo(b.x+nx,b.y+ny);
x.strokeStyle="rgba("+gold+","+(alpha*0.4)+")";
x.lineWidth=0.4;x.stroke();
}
}
}
}

// Draw shockwave rings
for(var i=rings.length-1;i>=0;i--){
var r=rings[i];
r.r+=3;r.life=1-r.r/r.maxR;
if(r.life<=0){rings.splice(i,1);continue}
x.beginPath();x.arc(r.x,r.y,r.r,0,Math.PI*2);
x.strokeStyle="rgba("+gold+","+(r.life*0.2)+")";
x.lineWidth=2;x.stroke();
// Inner ring
x.beginPath();x.arc(r.x,r.y,r.r*0.7,0,Math.PI*2);
x.strokeStyle="rgba("+gold+","+(r.life*0.08)+")";
x.lineWidth=1;x.stroke();
}

// Draw lightning bolts
for(var i=bolts.length-1;i>=0;i--){
var b=bolts[i];
var alpha=b.life/15;
drawBolt(b.ax,b.ay,b.bx,b.by,alpha*0.9,4);
// White-hot core flash
x.beginPath();
x.moveTo(b.ax,b.ay);x.lineTo(b.bx,b.by);
x.strokeStyle="rgba(255,240,200,"+alpha*0.25+")";
x.lineWidth=5;x.stroke();
b.life--;
if(b.life<=0)bolts.splice(i,1);
}

// Draw nodes
for(var i=0;i<N;i++){
var n=nodes[i];
var pulse=0.5+0.5*Math.sin(n.phase);
var surge=n.energy;
var size=n.r+surge*5;

// Energised blast glow
if(surge>0.1){
var g=x.createRadialGradient(n.x,n.y,0,n.x,n.y,size*10);
g.addColorStop(0,"rgba(255,220,100,"+surge*0.3+")");
g.addColorStop(0.2,"rgba("+gold+","+surge*0.15+")");
g.addColorStop(1,"rgba(0,0,0,0)");
x.beginPath();x.arc(n.x,n.y,size*10,0,Math.PI*2);
x.fillStyle=g;x.fill();
}

// Standard glow
var g2=x.createRadialGradient(n.x,n.y,0,n.x,n.y,size*3);
g2.addColorStop(0,"rgba("+gold+","+(0.25+pulse*0.1+surge*0.3)+")");
g2.addColorStop(1,"rgba("+gold+",0)");
x.beginPath();x.arc(n.x,n.y,size*3,0,Math.PI*2);
x.fillStyle=g2;x.fill();

// Hard core — white-hot when energised
x.beginPath();x.arc(n.x,n.y,n.r+surge*2.5,0,Math.PI*2);
if(surge>0.4)x.fillStyle="rgba(255,250,220,"+(0.8+pulse*0.2)+")";
else x.fillStyle="rgba("+gold+","+(0.7+pulse*0.3)+")";
x.fill();

// Locked nodes get crosshair — mechanical anchor
if(n.locked){
x.strokeStyle="rgba("+gold+",0.15)";
x.lineWidth=0.5;
x.beginPath();x.moveTo(n.x-12,n.y);x.lineTo(n.x+12,n.y);x.stroke();
x.beginPath();x.moveTo(n.x,n.y-12);x.lineTo(n.x,n.y+12);x.stroke();
}
}

// Deep breathing power core — slow, inevitable
var cp=0.5+0.5*Math.sin(t*0.008);
var cg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.5);
cg.addColorStop(0,"rgba("+gold+","+(cp*0.05)+")");
cg.addColorStop(0.4,"rgba(160,120,20,"+(cp*0.02)+")");
cg.addColorStop(1,"rgba(0,0,0,0)");
x.beginPath();x.arc(W/2,H/2,W*0.5,0,Math.PI*2);
x.fillStyle=cg;x.fill();

// Scan line — industrial surveillance feel
var scanY=(t*1.5)%H;
x.fillStyle="rgba("+gold+",0.015)";
x.fillRect(0,scanY-1,W,2);

requestAnimationFrame(draw);
}
draw();
})();
</script>
</body>
</html>
